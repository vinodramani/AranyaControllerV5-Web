<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AranyaController V5</title>
<style>
  :root {
    --bg:       #121212;
    --card:     #1e1e1e;
    --border:   #2c2c2c;
    --text:     #ffffff;
    --muted:    #9e9e9e;
    --green:    #4caf50;
    --red:      #f44336;
    --cyan:     #00bcd4;
    --yellow:   #ffc107;
    --blue:     #2196f3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    max-width: 480px;
    margin: 0 auto;
  }
  h1 {
    color: var(--green);
    font-size: 20px;
    text-align: center;
    margin-bottom: 4px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    margin-bottom: 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .card-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  /* Status dot */
  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
  }
  .dot.on { background: var(--green); }
  #statusText { font-size: 14px; color: var(--red); }
  #statusText.on { color: var(--green); }
  /* Clock */
  #tvDate { font-size: 15px; color: var(--text); margin-bottom: 2px; }
  #tvTime { font-size: 28px; font-weight: bold; color: var(--cyan); margin-bottom: 10px; }
  /* Output status */
  .output-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    text-align: center;
  }
  .output-item .label { font-size: 11px; color: var(--muted); }
  .output-item .value {
    font-size: 20px;
    font-weight: bold;
    color: var(--red);
  }
  .output-item .value.on { color: var(--green); }
  /* Buttons */
  btn, button {
    display: block;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .btn-green  { background: var(--green);  color: #121212; }
  .btn-cyan   { background: var(--cyan);   color: #121212; }
  .btn-yellow { background: var(--yellow); color: #121212; }
  .btn-blue   { background: var(--blue);   color: #ffffff; }
  .btn-red    { background: var(--red);    color: #ffffff; }
  .btn-gray   { background: #424242;       color: #ffffff; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .btn-row button { margin-bottom: 0; }
  /* Schedule slots */
  .slot-row {
    display: flex;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 8px;
    gap: 8px;
  }
  .slot-info { flex: 1; }
  .slot-info .slot-num { font-size: 12px; color: var(--muted); }
  .slot-info .slot-val { font-size: 14px; color: var(--text); }
  .slot-row button {
    width: auto;
    padding: 6px 14px;
    font-size: 12px;
    margin-bottom: 0;
    border-radius: 6px;
  }
  .sched-section-title {
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .sched-section-title.light { color: var(--yellow); }
  .sched-section-title.pump  { color: var(--blue); }
  /* Modal overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    width: 90%;
    max-width: 340px;
  }
  .modal h3 { margin-bottom: 16px; color: var(--cyan); font-size: 16px; }
  .modal label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal input[type=time], .modal input[type=checkbox] {
    width: 100%;
    padding: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 16px;
  }
  .modal input[type=checkbox] { width: auto; margin-right: 8px; }
  .modal .check-row { display: flex; align-items: center; margin-top: 14px; }
  .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
  .modal-btns button { flex: 1; }
  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 200;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<h1>AranyaController V5</h1>
<p class="subtitle">WiFi Dashboard</p>

<!-- Connection card -->
<div class="card">
  <div class="status-row">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Not connected</span>
  </div>
  <button class="btn-green" id="btnConnect" onclick="toggleConnect()">Connect</button>
</div>

<!-- Device clock card -->
<div class="card">
  <div class="card-label">Device Clock</div>
  <div id="tvDate">--/--/----</div>
  <div id="tvTime">--:-- --</div>
  <button class="btn-cyan" onclick="syncTime()" id="btnSync" disabled>Sync Phone Time to Device</button>
</div>

<!-- Output status card -->
<div class="card">
  <div class="card-label">Output Status</div>
  <div class="output-grid">
    <div class="output-item">
      <div class="label">LIGHT</div>
      <div class="value" id="tvLight">---</div>
    </div>
    <div class="output-item">
      <div class="label">PUMP</div>
      <div class="value" id="tvPump">---</div>
    </div>
    <div class="output-item">
      <div class="label">WATER</div>
      <div class="value" id="tvWater">---</div>
    </div>
  </div>
</div>

<!-- Manual trigger card -->
<div class="card">
  <div class="card-label">Manual Trigger</div>
  <div class="btn-row">
    <button class="btn-yellow" onclick="triggerLight()" id="btnLight" disabled>Trigger Light</button>
    <button class="btn-blue"   onclick="triggerPump()"  id="btnPump"  disabled>Trigger Pump</button>
  </div>
</div>

<!-- Schedules card -->
<div class="card">
  <div class="sched-section-title light">Light Schedules</div>
  <div id="lightSlots"></div>
  <div class="sched-section-title pump" style="margin-top:12px">Pump Schedules</div>
  <div id="pumpSlots"></div>
  <button class="btn-red" onclick="clearAllSchedules()" id="btnClearAll" disabled style="margin-top:8px">Clear All Schedules</button>
</div>

<!-- Light schedule modal -->
<div class="modal-overlay" id="lightModal">
  <div class="modal">
    <h3 id="lightModalTitle">Light Schedule</h3>
    <label>ON Time</label>
    <input type="time" id="lightOnTime">
    <label>OFF Time</label>
    <input type="time" id="lightOffTime">
    <div class="check-row">
      <input type="checkbox" id="lightEnabled" checked>
      <label style="margin:0;color:var(--text)">Enabled</label>
    </div>
    <div class="modal-btns">
      <button class="btn-gray"  onclick="closeLightModal()">Cancel</button>
      <button class="btn-yellow" onclick="saveLightSchedule()">Save</button>
    </div>
  </div>
</div>

<!-- Pump schedule modal -->
<div class="modal-overlay" id="pumpModal">
  <div class="modal">
    <h3 id="pumpModalTitle">Pump Schedule</h3>
    <label>ON Time</label>
    <input type="time" id="pumpOnTime">
    <div class="check-row">
      <input type="checkbox" id="pumpEnabled" checked>
      <label style="margin:0;color:var(--text)">Enabled</label>
    </div>
    <div class="modal-btns">
      <button class="btn-gray" onclick="closePumpModal()">Cancel</button>
      <button class="btn-blue" onclick="savePumpSchedule()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────
const DEVICE_URL = 'http://aranya-ctrl.local';
const POLL_MS    = 3000;

// ── State ─────────────────────────────────────────────────────────
let connected    = false;
let pollTimer    = null;
let editSlot     = -1;
let editType     = '';
let lastState    = null;

// ── Connection ────────────────────────────────────────────────────
function toggleConnect() {
  if (connected) {
    disconnect();
  } else {
    connectDevice();
  }
}

async function connectDevice() {
  setStatus('Connecting…', false);
  document.getElementById('btnConnect').disabled = true;
  try {
    const state = await fetchState();
    if (state) {
      connected = true;
      setStatus('Connected to AranyaCtrl', true);
      document.getElementById('btnConnect').textContent = 'Disconnect';
      setControlsEnabled(true);
      applyState(state);
      pollTimer = setInterval(pollState, POLL_MS);
    }
  } catch(e) {
    setStatus('Connection failed — check WiFi', false);
  }
  document.getElementById('btnConnect').disabled = false;
}

function disconnect() {
  connected = false;
  clearInterval(pollTimer);
  pollTimer = null;
  setStatus('Disconnected', false);
  document.getElementById('btnConnect').textContent = 'Connect';
  setControlsEnabled(false);
  resetDisplay();
}

async function pollState() {
  if (!connected) return;
  try {
    const state = await fetchState();
    if (state) applyState(state);
  } catch(e) {
    // silently ignore poll failures
  }
}

// ── HTTP helpers ──────────────────────────────────────────────────
async function fetchState() {
  const res = await fetch(`${DEVICE_URL}/state`, { signal: AbortSignal.timeout(5000) });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function sendCmd(payload) {
  if (!connected) return;
  const res = await fetch(`${DEVICE_URL}/cmd`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
    signal: AbortSignal.timeout(5000)
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const state = await res.json();
  applyState(state);
  return state;
}

// ── Apply state to UI ─────────────────────────────────────────────
function applyState(s) {
  lastState = s;

  // Clock
  if (s.time) {
    const parts = s.time.split(' ');
    const dateParts = parts[0].split('-');
    document.getElementById('tvDate').textContent =
      `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
    const timeParts = parts[1].split(':');
    let h = parseInt(timeParts[0]);
    const m = timeParts[1];
    const ampm = h >= 12 ? 'PM' : 'AM';
    if (h === 0) h = 12; else if (h > 12) h -= 12;
    document.getElementById('tvTime').textContent =
      `${String(h).padStart(2,'0')}:${m} ${ampm}`;
  }

  // Outputs
  setOutput('tvLight', s.light);
  setOutput('tvPump',  s.pump);
  const waterOk = s.water === 'ok';
  const wEl = document.getElementById('tvWater');
  wEl.textContent = waterOk ? 'OK' : 'LOW';
  wEl.className   = 'value' + (waterOk ? ' on' : '');

  // Schedules
  renderLightSlots(s.lightSchedules || []);
  renderPumpSlots(s.pumpSchedules   || []);
}

function setOutput(id, state) {
  const el = document.getElementById(id);
  el.textContent = state ? 'ON' : 'OFF';
  el.className   = 'value' + (state ? ' on' : '');
}

// ── Schedule rendering ────────────────────────────────────────────
function renderLightSlots(slots) {
  const container = document.getElementById('lightSlots');
  container.innerHTML = '';
  slots.forEach((s, i) => {
    const onStr  = s.enabled ? `${pad(s.onH)}:${pad(s.onM)}`  : '--:--';
    const offStr = s.enabled ? `${pad(s.offH)}:${pad(s.offM)}` : '--:--';
    const valText = s.enabled ? `${onStr} – ${offStr}` : 'Not set';
    container.innerHTML += `
      <div class="slot-row">
        <div class="slot-info">
          <div class="slot-num">Slot ${i+1}</div>
          <div class="slot-val">${valText}</div>
        </div>
        <button class="btn-yellow" onclick="openLightModal(${i})" ${connected?'':'disabled'}>Set</button>
        <button class="btn-gray"   onclick="clearLightSlot(${i})" ${connected?'':'disabled'}>Clear</button>
      </div>`;
  });
}

function renderPumpSlots(slots) {
  const container = document.getElementById('pumpSlots');
  container.innerHTML = '';
  slots.forEach((s, i) => {
    const onStr  = s.enabled ? `${pad(s.onH)}:${pad(s.onM)}` : '--:--';
    const valText = s.enabled ? `${onStr}  (2 min run)` : 'Not set';
    container.innerHTML += `
      <div class="slot-row">
        <div class="slot-info">
          <div class="slot-num">Slot ${i+1}</div>
          <div class="slot-val">${valText}</div>
        </div>
        <button class="btn-blue" onclick="openPumpModal(${i})" ${connected?'':'disabled'}>Set</button>
        <button class="btn-gray" onclick="clearPumpSlot(${i})" ${connected?'':'disabled'}>Clear</button>
      </div>`;
  });
}

// ── Commands ──────────────────────────────────────────────────────
async function triggerLight() {
  try {
    await sendCmd({ cmd: 'light_trigger' });
    toast('Light triggered');
  } catch(e) { toast('Command failed'); }
}

async function triggerPump() {
  try {
    await sendCmd({ cmd: 'pump_trigger' });
    toast('Pump triggered');
  } catch(e) { toast('Command failed'); }
}

async function syncTime() {
  const now = new Date();
  try {
    await sendCmd({
      cmd:   'set_time',
      year:  now.getFullYear(),
      month: now.getMonth() + 1,
      day:   now.getDate(),
      hour:  now.getHours(),
      min:   now.getMinutes(),
      sec:   now.getSeconds()
    });
    toast('Time synced');
  } catch(e) { toast('Sync failed'); }
}

async function clearAllSchedules() {
  if (!confirm('Clear all schedules on device?')) return;
  try {
    await sendCmd({ cmd: 'clear_schedule' });
    toast('All schedules cleared');
  } catch(e) { toast('Command failed'); }
}

// ── Light modal ───────────────────────────────────────────────────
function openLightModal(slot) {
  editSlot = slot;
  document.getElementById('lightModalTitle').textContent = `Light Schedule — Slot ${slot+1}`;
  const s = lastState?.lightSchedules?.[slot];
  if (s && s.enabled) {
    document.getElementById('lightOnTime').value  = `${pad(s.onH)}:${pad(s.onM)}`;
    document.getElementById('lightOffTime').value = `${pad(s.offH)}:${pad(s.offM)}`;
    document.getElementById('lightEnabled').checked = true;
  } else {
    document.getElementById('lightOnTime').value  = '06:00';
    document.getElementById('lightOffTime').value = '22:00';
    document.getElementById('lightEnabled').checked = false;
  }
  document.getElementById('lightModal').classList.add('show');
}

function closeLightModal() {
  document.getElementById('lightModal').classList.remove('show');
}

async function saveLightSchedule() {
  const on  = document.getElementById('lightOnTime').value.split(':');
  const off = document.getElementById('lightOffTime').value.split(':');
  const en  = document.getElementById('lightEnabled').checked;
  closeLightModal();
  try {
    await sendCmd({
      cmd:     'set_schedule',
      type:    'light',
      index:   editSlot,
      onH:     parseInt(on[0]),
      onM:     parseInt(on[1]),
      offH:    parseInt(off[0]),
      offM:    parseInt(off[1]),
      enabled: en
    });
    toast(`Light slot ${editSlot+1} saved`);
  } catch(e) { toast('Save failed'); }
}

async function clearLightSlot(slot) {
  try {
    await sendCmd({ cmd:'set_schedule', type:'light', index:slot,
                    onH:0, onM:0, offH:0, offM:0, enabled:false });
    toast(`Light slot ${slot+1} cleared`);
  } catch(e) { toast('Command failed'); }
}

// ── Pump modal ────────────────────────────────────────────────────
function openPumpModal(slot) {
  editSlot = slot;
  document.getElementById('pumpModalTitle').textContent = `Pump Schedule — Slot ${slot+1}`;
  const s = lastState?.pumpSchedules?.[slot];
  if (s && s.enabled) {
    document.getElementById('pumpOnTime').value  = `${pad(s.onH)}:${pad(s.onM)}`;
    document.getElementById('pumpEnabled').checked = true;
  } else {
    document.getElementById('pumpOnTime').value  = '08:00';
    document.getElementById('pumpEnabled').checked = false;
  }
  document.getElementById('pumpModal').classList.add('show');
}

function closePumpModal() {
  document.getElementById('pumpModal').classList.remove('show');
}

async function savePumpSchedule() {
  const on = document.getElementById('pumpOnTime').value.split(':');
  const en = document.getElementById('pumpEnabled').checked;
  closePumpModal();
  try {
    await sendCmd({
      cmd:     'set_schedule',
      type:    'pump',
      index:   editSlot,
      onH:     parseInt(on[0]),
      onM:     parseInt(on[1]),
      enabled: en
    });
    toast(`Pump slot ${editSlot+1} saved`);
  } catch(e) { toast('Save failed'); }
}

async function clearPumpSlot(slot) {
  try {
    await sendCmd({ cmd:'set_schedule', type:'pump', index:slot,
                    onH:0, onM:0, enabled:false });
    toast(`Pump slot ${slot+1} cleared`);
  } catch(e) { toast('Command failed'); }
}

// ── UI helpers ────────────────────────────────────────────────────
function setStatus(msg, ok) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('statusText').className   = ok ? 'on' : '';
  document.getElementById('statusDot').className    = 'dot' + (ok ? ' on' : '');
}

function setControlsEnabled(en) {
  ['btnLight','btnPump','btnSync','btnClearAll'].forEach(id => {
    document.getElementById(id).disabled = !en;
  });
}

function resetDisplay() {
  document.getElementById('tvDate').textContent  = '--/--/----';
  document.getElementById('tvTime').textContent  = '--:-- --';
  ['tvLight','tvPump','tvWater'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = '---';
    el.className   = 'value';
  });
  document.getElementById('lightSlots').innerHTML = '';
  document.getElementById('pumpSlots').innerHTML  = '';
}

function pad(n) { return String(n).padStart(2,'0'); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// Close modals on overlay click
document.getElementById('lightModal').addEventListener('click', function(e) {
  if (e.target === this) closeLightModal();
});
document.getElementById('pumpModal').addEventListener('click', function(e) {
  if (e.target === this) closePumpModal();
});
</script>
</body>
</html>
